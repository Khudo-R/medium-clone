version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: medium_user
      POSTGRES_PASSWORD: medium_password
      POSTGRES_DB: medium_db
    ports:
      - '5430:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6380:6379'

  api:
    build: .
    restart: always
    ports:
      - '3000:3030'
    env_file:
      - .env
    environment:
      DATABASE_URL: 'postgresql://medium_user:medium_password@db:5432/medium_db?schema=public'
      REDIS_URL: 'redis://redis:6379'
    depends_on:
      - db
      - redis
    command: pnpm run dev
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
